---
- name: Link vimrc.
  ansible.builtin.file:
    src: "{{ dotfiles_dist }}/vimrc"
    dest: "{{ user_home }}/.vimrc"
    state: link
    force: true

- name: Ensure Vim autoload directory exists.
  ansible.builtin.file:
    path: "{{ user_home }}/.vim/autoload"
    state: directory
    mode: "0755"

- name: Install vim-plug.
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: "{{ user_home }}/.vim/autoload/plug.vim"
    mode: "0644"

- name: Vim CoC settings.
  ansible.builtin.file:
    src: "{{ dotfiles_dist }}/vim/coc-settings.json"
    dest: "{{ user_home }}/.vim/coc-settings.json"
    state: link
    force: true

- name: Vim after plugin highlights.
  ansible.builtin.file:
    src: "{{ dotfiles_dist }}/vim/final.vim"
    dest: "{{ user_home }}/.vim/final.vim"
    state: link
    force: true
