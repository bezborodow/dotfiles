---
- name: Install nvm.
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"

- name: Install latest LTS Node.js.
  ansible.builtin.shell:
    cmd: |
      source "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
      nvm install --lts
      nvm alias default lts/*
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.nvm/alias/default"
